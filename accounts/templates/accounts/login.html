<h2>Login</h2>
<form method="POST">
  {% csrf_token %}
  <input name="username" placeholder="Username" required>
  <input name="password" type="password" required>
  <button type="submit">Login</button>
  <a href="{% url 'register' %}">Create an account?</a>
</form>

{% if error %}<p>{{ error }}</p>{% endif %}
